name: 24/7 Live Stream Bot

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Stream URL'
        required: true
        type: string
        default: 'https://dlstreams.com/watch.php?id=598'
      okru_stream_channel: # 🚀 OK.ru Stream Channel Selector
        description: 'OK.ru Broadcast Channel (1 to 5)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      use_proxy:
        description: 'Use Proxy (ON or OFF)'
        required: true
        type: choice
        options:
          - 'OFF'
          - 'ON'
        default: 'OFF'
      stream_quality:
        description: 'Internet Speed / Stream Quality'
        required: true
        type: choice
        options:
          - '40KBps (Ultra-Low 360p)'
          - '110KBps (Balanced 480p)'
        default: '110KBps (Balanced 480p)'
      # =========================================================================
      # [UPGRADE INPUTS] - MANUAL INTERACTION SETTINGS
      # Examples:
      #   1. By Property (aria-label):  [aria-label="Play"]  <-- Example from image
      #   2. By Class: button.play-button
      #   3. By Multiple: .player-btn, #start-btn
      #   4. Direct Document Click: javascript:document.getElementById("play-id").click()
      # =========================================================================
      play_button_selector:
        description: 'Play Button Selector (Optional, with examples above)'
        required: false
        type: string
        default: ''

  # schedule:
  #   - cron: '0 */5 * * *'
  # yeh code k matlb hai k yeh action automatically khud ba khud action run huu

permissions:
  contents: write

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Hours Limit set for safety

    steps:
    - name: Get Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install FFmpeg, Virtual Display, & Audio Server
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg xvfb pulseaudio dbus-x11

    - name: Install Required Packages
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth puppeteer-screen-recorder

      








